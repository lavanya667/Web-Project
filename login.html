<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Movie Ticket Collector</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <nav class="navbar">
        <div class="nav-content" style="justify-content: center;">
            <div class="logo">🍿 Movie Ticket Collector</div>
        </div>
    </nav>

    <div class="auth-container glass-effect">
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Login to book your tickets</p>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" required placeholder="name@example.com" value="test@example.com">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••" value="password123">
            </div>
            
            <p id="error-msg" class="error-msg"></p>
            
            <button type="submit" class="btn-primary auth-btn">Login</button>
        </form>
        
        <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up here</a></p>
    </div>

    <script src="auth.js"></script>
</body>
</html>
